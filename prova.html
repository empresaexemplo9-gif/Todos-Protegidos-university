<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar prova — Todos Protegidos University</title>
  <meta name="description" content="Cadastro e edição das questões da prova do módulo (administrador).">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <meta name="theme-color" content="#2536cf">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/img/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="TP University">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/internal.css">
  <style>
    .field { margin-bottom: 16px; }
    .field label { display: block; font-family: var(--tp-font-sans); font-weight: var(--tp-fw-semi); font-size: var(--tp-fs-sm); margin-bottom: 6px; color: var(--tp-ink); }
    .field textarea, .field .input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--tp-line); border-radius: var(--tp-radius-sm); font: inherit; color: var(--tp-ink); background: #fff; }
    .field textarea:focus, .field .input:focus { outline: none; border-color: var(--tp-green-400); box-shadow: var(--tp-ring); }
    .opt-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .opt-row input[type=radio] { width: 18px; height: 18px; flex: none; }
    .opt-row .input { flex: 1; }
    .form-msg { display: none; padding: 11px 14px; border-radius: var(--tp-radius-sm); font-size: var(--tp-fs-sm); margin: 12px 0; }
    .form-msg.show { display: block; }
    .form-msg.err { background: #fde6e6; color: var(--tp-danger); }
    .form-msg.ok { background: var(--tp-green-50); color: var(--tp-green-700); }
    .prova-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
    @media (max-width: 880px){ .prova-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="dashboard.html"><img src="assets/img/logo.svg" alt="Todos Protegidos"></a>
      <div class="nav-cta">
        <a href="gestao.html" class="btn btn-ghost btn-sm">← Gestão de conteúdo</a>
        <button type="button" class="btn btn-ghost btn-sm" data-logout>Sair</button>
      </div>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <div id="provaApp">
        <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px">
          <div>
            <span class="eyebrow">Editor de prova</span>
            <h1 id="provaTitulo" style="margin:0">Prova do módulo</h1>
            <p class="muted" style="margin:4px 0 0">Cadastre as questões (cada uma com a alternativa correta). Meta: <strong>10 questões</strong> por prova.</p>
          </div>
          <span class="badge badge-blue">Questões: <span id="provaContador" style="margin-left:4px">0/10</span></span>
        </div>

        <div id="provaMsg" class="form-msg"></div>

        <div class="prova-grid" style="margin-top:18px">
          <!-- FORMULÁRIO -->
          <form id="provaForm" class="card">
            <h3 id="pFormTitle" style="margin-top:0">Adicionar questão</h3>
            <div class="field">
              <label for="pEnunciado">Enunciado</label>
              <textarea id="pEnunciado" rows="3" placeholder="Escreva a pergunta..."></textarea>
            </div>
            <div class="field">
              <label>Alternativas <span class="muted" style="font-weight:400">(marque a correta no círculo)</span></label>
              <div class="opt-row"><input type="radio" name="pCorreta" value="0" title="Correta"><input id="pOp0" class="input" placeholder="Alternativa A"></div>
              <div class="opt-row"><input type="radio" name="pCorreta" value="1" title="Correta"><input id="pOp1" class="input" placeholder="Alternativa B"></div>
              <div class="opt-row"><input type="radio" name="pCorreta" value="2" title="Correta"><input id="pOp2" class="input" placeholder="Alternativa C (opcional)"></div>
              <div class="opt-row"><input type="radio" name="pCorreta" value="3" title="Correta"><input id="pOp3" class="input" placeholder="Alternativa D (opcional)"></div>
            </div>
            <div class="form-actions" style="display:flex;gap:10px">
              <button type="submit" class="btn btn-primary" id="pSubmit">Adicionar questão</button>
              <button type="button" class="btn btn-ghost" id="pCancel" style="display:none">Cancelar edição</button>
            </div>
          </form>

          <!-- LISTA -->
          <div>
            <h3 style="margin-top:0">Questões cadastradas</h3>
            <div id="provaLista"><div class="gestao-empty" style="padding:24px">Carregando…</div></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
