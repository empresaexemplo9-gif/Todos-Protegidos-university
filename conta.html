<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha conta — Todos Protegidos University</title>
  <meta name="description" content="Edite os dados da sua conta na plataforma Todos Protegidos University.">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <meta name="theme-color" content="#2536cf">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    .field { margin-bottom: 16px; }
    .field label { display: block; font-family: var(--tp-font-sans); font-weight: var(--tp-fw-semi); font-size: var(--tp-fs-sm); margin-bottom: 6px; color: var(--tp-ink); }
    .field input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--tp-line); border-radius: var(--tp-radius-sm); font: inherit; color: var(--tp-ink); background: #fff; transition: border-color var(--tp-transition), box-shadow var(--tp-transition); }
    .field input:focus { outline: none; border-color: var(--tp-green-400); box-shadow: var(--tp-ring); }
    .field input:disabled { background: var(--tp-bg-alt); color: var(--tp-muted); }
    .field .hint { font-size: var(--tp-fs-xs); color: var(--tp-muted); margin-top: 5px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-msg { display: none; padding: 11px 14px; border-radius: var(--tp-radius-sm); font-size: var(--tp-fs-sm); margin-bottom: 14px; }
    .form-msg.show { display: block; }
    .form-msg.err { background: #fde6e6; color: var(--tp-danger); }
    .form-msg.ok { background: var(--tp-green-50); color: var(--tp-green-700); }
    .sec-title { font-family: var(--tp-font-sans); font-weight: var(--tp-fw-bold); font-size: var(--tp-fs-lg); margin: 26px 0 6px; }
    .sec-sub { color: var(--tp-muted); font-size: var(--tp-fs-sm); margin: 0 0 16px; }
    hr.div { border: 0; border-top: 1px solid var(--tp-line); margin: 26px 0; }
    @media (max-width: 560px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="dashboard.html"><img src="assets/img/logo.svg" alt="Todos Protegidos"></a>
      <div class="nav-cta">
        <a href="dashboard.html" class="btn btn-ghost btn-sm">← Voltar ao painel</a>
        <button type="button" class="btn btn-ghost btn-sm" data-logout>Sair</button>
      </div>
    </div>
  </header>

  <section class="section">
    <div class="container" style="max-width:580px">
      <span class="eyebrow">Minha conta</span>
      <h1 style="margin-bottom:6px">Editar dados da conta</h1>
      <p class="muted" id="contaPerfil">Atualize seus dados pessoais e sua senha.</p>

      <div id="contaMsg" class="form-msg"></div>

      <form id="contaForm" class="card" style="margin-top:8px">
        <div class="field">
          <label for="c_email">E-mail (login)</label>
          <input id="c_email" type="email" autocomplete="email" placeholder="voce@email.com" required>
          <span class="hint">É o seu login. Se a confirmação de e-mail estiver ativa, confirme pelo link enviado ao novo endereço.</span>
        </div>
        <div class="field">
          <label for="c_nome">Nome completo</label>
          <input id="c_nome" type="text" autocomplete="name" placeholder="Seu nome" required>
        </div>
        <div class="field">
          <label for="c_telefone">Telefone / WhatsApp</label>
          <input id="c_telefone" type="tel" autocomplete="tel" placeholder="(00) 00000-0000">
        </div>

        <hr class="div">
        <div class="sec-title">Alterar senha</div>
        <p class="sec-sub">Deixe em branco se não quiser alterar a senha agora.</p>
        <div class="form-row">
          <div class="field">
            <label for="c_senha">Nova senha</label>
            <input id="c_senha" type="password" autocomplete="new-password" placeholder="Mín. 6 caracteres">
          </div>
          <div class="field">
            <label for="c_senha2">Confirmar nova senha</label>
            <input id="c_senha2" type="password" autocomplete="new-password" placeholder="Repita a nova senha">
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="margin-top:8px">Salvar alterações</button>
      </form>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
